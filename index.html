<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Ucapan Spesial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-container">
        <div class="slideshow">
            <img id="slide" src="foto1.jpg" alt="Kenangan">
        </div>

        <div class="content">
            <h1>Untukmu,</h1>
            <p id="quote">"Setiap detik bersamamu adalah cerita favoritku."</p>
        </div>

        <audio id="mySong" loop>
            <source src="musik.mp3" type="audio/mpeg">
        </audio>
        
        <button id="playBtn" onclick="togglePlay()">Mulai Musik 🎵</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
