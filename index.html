<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Gift</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="overlay" onclick="mulai()">
        <div class="overlay-content">
            <div class="heart">❤️</div>
            <h2>Ada pesan spesial untukmu</h2>
            <p>Klik di mana saja untuk membuka</p>
        </div>
    </div>

    <div class="card">
        <div class="image-wrapper">
            <img id="main-slide" src="" alt="Memory">
        </div>
        
        <div class="text-section">
            <h1 class="title">Untukmu</h1>
            <p id="quote" class="quote">"Setiap detik bersamamu adalah cerita favoritku."</p>
            
            <div class="lyrics-container">
                <p id="lyrics">🎵 Menyiapkan melodi...</p>
            </div>
        </div>

        <div class="controls">
            <button id="musicBtn" onclick="togglePlay()">Jeda Musik ⏸️</button>
        </div>
    </div>

    <audio id="audio" loop>
        <source src="" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
